{% extends "admin/change_list.html" %}

{% block content_title %}
  {{ block.super }}
  {% if dashboard_stats %}
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin:16px 0 4px 0;">
      {% for stat in dashboard_stats %}
        <div style="border:1px solid #d9d9d9;border-radius:8px;padding:12px 14px;background:#fff;">
          <div style="font-size:12px;color:#666;text-transform:uppercase;letter-spacing:.03em;">
            {{ stat.label }}
          </div>
          <div style="font-size:24px;font-weight:700;color:#111;margin-top:4px;">
            {{ stat.value }}
          </div>
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endblock %}
